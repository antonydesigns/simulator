<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Grid Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>⚡ Power Grid Simulator</h1>
    <span class="badge" id="nodeCount">2 nodes</span>
    <div class="header-actions">
      <button id="addGenBtn" class="action-btn">+ Generator</button>
      <button id="addLoadBtn" class="action-btn">+ Load</button>
      <button id="saveBtn" class="action-btn">💾 Save</button>
    </div>
  </header>

  <main>
    <div class="canvas-viewport" id="canvasViewport">
      <div class="canvas-world" id="canvasWorld">
        <!-- Grid background -->
        <div class="canvas-grid" id="canvasGrid"></div>

        <!-- SVG overlay for connections -->
        <svg class="connections-svg" id="connectionsSvg">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#7a8a9a" />
            </marker>
          </defs>
        </svg>

        <!-- Nodes are rendered here by JS -->
        <div class="nodes-container" id="nodesContainer"></div>
      </div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button id="zoomIn" class="zoom-btn" title="Zoom In">+</button>
        <span id="zoomLevel" class="zoom-level">100%</span>
        <button id="zoomOut" class="zoom-btn" title="Zoom Out">−</button>
        <button id="zoomReset" class="zoom-btn zoom-reset" title="Reset View">⟲</button>
      </div>
    </div>

    <!-- Node settings modal -->
    <div id="settingsModal" class="settings-modal hidden">
      <div class="modal-header" id="modalHeader">
        <h3 id="modalTitle">⚙️ Settings</h3>
        <button id="closeModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="slider-group">
          <label for="powerSlider">Power (MW)</label>
          <div class="slider-row">
            <input type="range" id="powerSlider" min="0" max="50" value="10" step="0.5" />
            <span id="powerSliderValue" class="slider-value">10 MW</span>
          </div>
          <div class="slider-marks">
            <span>0 MW</span>
            <span>25 MW</span>
            <span>50 MW</span>
          </div>
        </div>
        <div class="panel-info" id="modalInfo">
          <div class="info-row">
            <span>Type</span>
            <span id="infoType">Load</span>
          </div>
          <div class="info-row">
            <span>Power</span>
            <span id="infoPower">10.0 MW</span>
          </div>
          <div class="info-row highlight">
            <span>Status</span>
            <span id="infoStatus" class="status-ok">✅ Balanced</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>Drag nodes • Scroll to zoom • Click a node to configure</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
