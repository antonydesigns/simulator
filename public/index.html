<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Grid Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="grid-canvas-container">
    <canvas id="grid-canvas"></canvas>
  </div>

  <!-- Controls Overlay -->
  <div id="controls-bar">
    <button id="play-btn" class="ctrl-btn" title="Play">▶ Play</button>
    <button id="pause-btn" class="ctrl-btn" title="Pause" disabled>⏸ Pause</button>
    <button id="restart-btn" class="ctrl-btn" title="Restart">⟳ Restart</button>
    <button id="balance-btn" class="ctrl-btn" title="Balance supply with demand">⚖️ Balance</button>
    <span class="ctrl-sep"></span>
    <span class="speed-group">
      <label class="speed-label" for="speed-slider">⏩</label>
      <input type="range" id="speed-slider" class="speed-slider" min="1" max="4" step="0.5" value="1">
      <span id="speed-value" class="speed-value">1×</span>
    </span>
    <span class="ctrl-sep"></span>
    <button id="save-data-btn" class="ctrl-btn save-btn" title="Save snapshot" disabled>💾 Save Data</button>
    <span class="ctrl-sep"></span>
    <span id="fcr-badge" class="status-badge fcr-inactive">FCR</span>
    <span id="agc-badge" class="status-badge agc-inactive">AGC</span>
    <span class="ctrl-sep"></span>
    <button id="merit-btn" class="ctrl-btn" title="Merit order">📈 Merit Order</button>
    <button id="stats-btn" class="ctrl-btn" title="System stats">📊</button>
  </div>

  <!-- Stats Panel -->
  <div id="stats-panel" class="stats-panel hidden">
    <div class="stats-header">
      <span>System Stats</span>
      <button id="stats-close-btn" class="stats-close">✕</button>
    </div>
    <div id="stats-body" class="stats-body"></div>
  </div>

  <!-- Frequency Chart Panel -->
  <div id="freq-chart-panel" class="freq-chart-panel hidden">
    <div class="freq-chart-header">
      <span>Frequency History</span>
      <button id="freq-chart-close-btn" class="freq-chart-close">✕</button>
    </div>
    <canvas id="freq-chart-canvas"></canvas>
    <input type="range" id="freq-scrollbar" class="freq-scrollbar" min="0" max="0" value="0">
  </div>

  <!-- Merit Order Panel -->
  <div id="merit-panel" class="merit-panel hidden">
    <div class="merit-header">
      <span>Merit Order</span>
      <button id="merit-close-btn" class="merit-close">✕</button>
    </div>
    <div class="merit-body">
      <canvas id="merit-canvas"></canvas>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="context-menu hidden">
    <div id="context-menu-items"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
