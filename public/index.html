<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Grid Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="grid-canvas-container">
    <canvas id="grid-canvas"></canvas>
  </div>

  <!-- Controls Overlay -->
  <div id="controls-bar">
    <button id="play-btn" class="ctrl-btn" title="Play">▶ Play</button>
    <button id="pause-btn" class="ctrl-btn" title="Pause" disabled>⏸ Pause</button>
    <button id="restart-btn" class="ctrl-btn" title="Restart">⟳ Restart</button>
    <button id="balance-btn" class="ctrl-btn" title="Balance supply with demand">⚖️ Balance</button>
    <span class="ctrl-sep"></span>
    <button id="save-data-btn" class="ctrl-btn save-btn" title="Save snapshot" disabled>💾 Save Data</button>
    <span class="ctrl-sep"></span>
    <span id="fcr-badge" class="status-badge fcr-inactive">FCR</span>
    <span id="afrr-badge" class="status-badge afrr-inactive">aFRR</span>
    <span class="ctrl-sep"></span>
    <button id="stats-btn" class="ctrl-btn" title="System stats">📊</button>
  </div>

  <!-- Stats Panel -->
  <div id="stats-panel" class="stats-panel hidden">
    <div class="stats-header">
      <span>System Stats</span>
      <button id="stats-close-btn" class="stats-close">✕</button>
    </div>
    <div id="stats-body" class="stats-body"></div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="context-menu hidden">
    <div id="context-menu-items"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
