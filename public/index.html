<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Grid Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="grid-canvas-container">
    <canvas id="grid-canvas"></canvas>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="context-menu hidden">
    <div id="context-menu-items"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <span class="settings-title" id="settings-title">Node</span>
      <span class="settings-close" id="settings-close">&times;</span>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <label class="settings-label">MW</label>
        <div class="settings-slider-group">
          <input type="range" id="mw-slider" class="mw-slider" min="0" max="1000" step="10" value="0">
          <span class="mw-value" id="mw-value">0</span>
        </div>
      </div>
    </div>
    <div class="settings-resize-handle"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
